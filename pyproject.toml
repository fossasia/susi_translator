[project]
name = "susi-translator"
version = "0.1.0"
description = "This project aims to provide a real-time audio transcription system, where audio input from a microphone is sent to a server, transcribed, and then displayed to the user in real-time."
readme = "README.md"
requires-python = ">=3.11, <3.14"
dependencies = [
    "django>=5.2.11",
    "django-cors-headers>=4.9.0",
    "djangorestframework>=3.16.1",
    "drf-yasg>=1.21.14",
    "flask>=3.1.3",
    "flask-cors>=6.0.2",
    "flask-restx>=1.3.2",
    "mkdocs>=1.6.1",
    "mkdocs-bootswatch>=1.1",
    "openai-whisper>=20250625",
    "pyaudio>=0.2.14",
    "pybars3>=0.9.7",
    "requests>=2.32.5",
    "whisper>=1.1.10",
]
